<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Plan de Ahorro</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f0fdf4; /* verde muy suave */
        color: #064e3b; /* verde oscuro para contraste */
        margin: 0;
        padding: 20px;
    }
    h1 {
        text-align: center;
        color: #047857; /* verde medio */
    }
    .container {
        max-width: 500px;
        margin: auto;
        background: #d1fae5; /* verde pastel */
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
    }
    input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border: 1px solid #10b981;
        border-radius: 5px;
    }
    button {
        margin-top: 15px;
        width: 100%;
        padding: 10px;
        background-color: #10b981; /* verde principal */
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
    }
    button:hover {
      background-color: #059669; /* verde más oscuro */
    }
    .resultado {
        margin-top: 20px;
        padding: 15px;
        background: #a7f3d0; /* verde suave */
        border-radius: 8px;
        font-size: 18px;
        text-align: center;
    }
    </style>
</head>
<body>
    <h1>💰 Plan de Ahorro</h1>
    <div class="container">
    <label for="cantidad">Cantidad a ahorrar cada mes (Q):</label>
    <input type="number" id="cantidad" placeholder="Ejemplo: 500">

    <label for="fecha">Fecha de inicio:</label>
    <input type="date" id="fecha">

    <button onclick="calcularAhorro()">Calcular ahorro anual</button>

    <div class="resultado" id="resultado"></div>
    </div>

    <script>
        function calcularAhorro() {
            const cantidad = parseFloat(document.getElementById("cantidad").value);
            const fecha = new Date(document.getElementById("fecha").value);

            if (isNaN(cantidad) || !fecha.getTime()) {
                document.getElementById("resultado").innerText = "Por favor ingresa datos válidos.";
            return;
            }

        // Calcular meses restantes hasta fin de año
            const mesInicio = fecha.getMonth(); // 0 = enero
            const mesesRestantes = 12 - mesInicio;

            const total = cantidad * mesesRestantes;

            document.getElementById("resultado").innerText =
        `Si ahorras Q${cantidad.toFixed(2)} cada mes desde ${fecha.toLocaleDateString()}, 
        al final del año tendrás Q${total.toFixed(2)}. 🌱`;
    }
    </script>
</body>
</html>
